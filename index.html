<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mini Roblox Studio</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
background:#1e1e1e;
}

#topbar{
position:fixed;
top:0;
left:0;
right:0;
height:60px;
background:#2b2b2b;
display:flex;
align-items:center;
padding:10px;
gap:10px;
z-index:1000;
}

button{
background:#0078ff;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
font-weight:bold;
}

#info{
color:white;
margin-left:auto;
}

#viewport{
position:fixed;
top:60px;
left:0;
right:0;
bottom:0;
}
</style>
</head>
<body>

<div id="topbar">
<button onclick="addPart()">Add Part</button>
<button onclick="removePart()">Delete Selected</button>
<div id="info">Mini Roblox Studio</div>
</div>

<div id="viewport"></div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js';

import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x202020);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(10,10,10);

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

document.getElementById("viewport")
.appendChild(renderer.domElement);

const controls = new OrbitControls(
camera,
renderer.domElement
);

controls.enableDamping=true;

const grid = new THREE.GridHelper(
100,
100
);

scene.add(grid);

const ambient = new THREE.AmbientLight(
0xffffff,
1
);

scene.add(ambient);

const sun = new THREE.DirectionalLight(
0xffffff,
2
);

sun.position.set(10,20,10);

scene.add(sun);

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

let selected=null;
const parts=[];

function addPart(){

const geo=new THREE.BoxGeometry(2,2,2);

const mat=new THREE.MeshStandardMaterial({
color:Math.random()*0xffffff
});

const cube=new THREE.Mesh(geo,mat);

cube.position.set(
(Math.random()-0.5)*10,
1,
(Math.random()-0.5)*10
);

scene.add(cube);
parts.push(cube);
}

window.addPart=addPart;

window.removePart=()=>{
if(selected){
scene.remove(selected);
selected=null;
}
};

for(let i=0;i<3;i++){
addPart();
}

window.addEventListener("click",(e)=>{

mouse.x=(e.clientX/window.innerWidth)*2-1;
mouse.y=-(e.clientY/window.innerHeight)*2+1;

raycaster.setFromCamera(
mouse,
camera
);

const hits=raycaster.intersectObjects(parts);

if(hits.length){

if(selected){
selected.material.emissive.set(0x000000);
}

selected=hits[0].object;

selected.material.emissive.set(0x00ff00);

}
});

window.addEventListener("resize",()=>{

camera.aspect=
window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});

function animate(){

requestAnimationFrame(animate);

controls.update();

renderer.render(
scene,
camera
);

}

animate();

</script>
</body>
</html>
