<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudFurm</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
    padding:0;
      box-sizing:border-box;
        font-family:Inter,sans-serif;
        }

        body{
          background:#ecebe7;
            min-height:100vh;
            }

            nav{
              position:fixed;
                top:18px;
                  left:50%;
                    transform:translateX(-50%);
                      width:min(950px,92%);
                        height:62px;
                          display:flex;
                            align-items:center;
                              justify-content:space-between;
                                padding:0 18px;
                                  background:rgba(255,255,255,.82);
                                    backdrop-filter:blur(18px);
                                      border:1px solid rgba(0,0,0,.08);
                                        border-radius:999px;
                                          box-shadow: 0 10px 35px rgba(0,0,0,.08);
                                            z-index:999;
                                            }

                                            .logo{
                                              display:flex;
                                                align-items:center;
                                                  gap:12px;
                                                    font-size:20px;
                                                      font-weight:800;
                                                        color:#111;
                                                        }

                                                        .logo-circle{
                                                          width:14px;
                                                            height:14px;
                                                              border-radius:50%;
                                                                background:#111;
                                                                }

                                                                .links{
                                                                  display:flex;
                                                                    gap:8px;
                                                                    }

                                                                    .links a{
                                                                      text-decoration:none;
                                                                        color:#555;
                                                                          padding:10px 18px;
                                                                            border-radius:999px;
                                                                              font-weight:600;
                                                                                transition:.25s;
                                                                                }

                                                                                .links a:hover{
                                                                                  background:white;
                                                                                    color:#111;
                                                                                      transform:translateY(-2px);
                                                                                        box-shadow: 0 6px 15px rgba(0,0,0,.08);
                                                                                        }

                                                                                        .button{
                                                                                          text-decoration:none;
                                                                                            background:#181818;
                                                                                              color:white;
                                                                                                padding:11px 22px;
                                                                                                  border-radius:999px;
                                                                                                    font-weight:700;
                                                                                                      transition:.25s;
                                                                                                      }

                                                                                                      .button:hover{
                                                                                                        transform:translateY(-2px);
                                                                                                          box-shadow: 0 10px 22px rgba(0,0,0,.18);
                                                                                                          }

                                                                                                          .hero{
                                                                                                            min-height:100vh;
                                                                                                              display:flex;
                                                                                                                justify-content:flex-start;
                                                                                                                  align-items:center;
                                                                                                                    flex-direction:column;
                                                                                                                      text-align:center;
                                                                                                                        padding:120px 20px 40px;
                                                                                                                        }

                                                                                                                        /* On-page API & Settings Button */
                                                                                                                        .api-banner-btn {
                                                                                                                          display: inline-block;
                                                                                                                            text-decoration: none;
                                                                                                                              font-family: 'Times New Roman', Times, serif;
                                                                                                                                font-style: italic;
                                                                                                                                  font-size: 32px;
                                                                                                                                    font-weight: 700;
                                                                                                                                      color: #111;
                                                                                                                                        background: #dad7ce;
                                                                                                                                          padding: 16px 48px;
                                                                                                                                            border-radius: 999px;
                                                                                                                                              margin-top: 20px;
                                                                                                                                                margin-bottom: 40px;
                                                                                                                                                  box-shadow: 0 4px 15px rgba(0,0,0,.05);
                                                                                                                                                    transition: all .25s ease;
                                                                                                                                                    }

                                                                                                                                                    .api-banner-btn:hover {
                                                                                                                                                      background: #cfcbc0;
                                                                                                                                                        transform: translateY(-3px);
                                                                                                                                                          box-shadow: 0 8px 22px rgba(0,0,0,.12);
                                                                                                                                                          }

                                                                                                                                                          .hero h1{
                                                                                                                                                            font-size:72px;
                                                                                                                                                              margin-bottom:15px;
                                                                                                                                                                color:#111;
                                                                                                                                                                }

                                                                                                                                                                .hero p{
                                                                                                                                                                  font-size:20px;
                                                                                                                                                                    color:#666;
                                                                                                                                                                      max-width:650px;
                                                                                                                                                                      }

                                                                                                                                                                      @media(max-width:850px){
                                                                                                                                                                        .links{
                                                                                                                                                                            display:none;
                                                                                                                                                                              }
                                                                                                                                                                                .hero h1{
                                                                                                                                                                                    font-size:46px;
                                                                                                                                                                                      }
                                                                                                                                                                                        .api-banner-btn {
                                                                                                                                                                                            font-size: 24px;
                                                                                                                                                                                                padding: 12px 32px;
                                                                                                                                                                                                  }
                                                                                                                                                                                                  }

                                                                                                                                                                                                  </style>
                                                                                                                                                                                                  </head>

                                                                                                                                                                                                  <body>

                                                                                                                                                                                                  <nav>

                                                                                                                                                                                                    <div class="logo">
                                                                                                                                                                                                        <div class="logo-circle"></div>
                                                                                                                                                                                                            CloudFurm
                                                                                                                                                                                                              </div>

                                                                                                                                                                                                                <div class="links">
                                                                                                                                                                                                                    <a href="index.html">Home</a>
                                                                                                                                                                                                                        <a href="https://youtube.com" target="_blank">Youtube</a>
                                                                                                                                                                                                                          </div>

                                                                                                                                                                                                                            <a href="start.html" class="button">Start</a>

                                                                                                                                                                                                                            </nav>

                                                                                                                                                                                                                            <section class="hero">

                                                                                                                                                                                                                              <h1>CloudFurm</h1>

                                                                                                                                                                                                                                <p>
                                                                                                                                                                                                                                    kuro is a really cool dude 
                                                                                                                                                                                                                                      </p>
                                                                                                                                                                                                                                        <a href="api-settings.html" class="api-banner-btn">API &amp; Settings</a>
                                                                                                                                                                                                                                        </section>

                                                                                                                                                                                                                                        </body>
                                                                                                                                                                                                                                        </html>
