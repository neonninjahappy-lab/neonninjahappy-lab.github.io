<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudFurm</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:#ecebe7;
color:#111;
}

nav{
position:fixed;
top:18px;
left:50%;
transform:translateX(-50%);
width:min(950px,92%);
height:62px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 18px;
background:rgba(255,255,255,.82);
backdrop-filter:blur(18px);
border:1px solid rgba(0,0,0,.08);
border-radius:999px;
box-shadow:0 10px 35px rgba(0,0,0,.08);
z-index:999;
}

.logo{
display:flex;
align-items:center;
gap:12px;
font-size:20px;
font-weight:800;
color:#111;
}

.logo-circle{
width:14px;
height:14px;
border-radius:50%;
background:#111;
}

.links{
display:flex;
gap:8px;
}

.links a{
text-decoration:none;
color:#555;
padding:10px 18px;
border-radius:999px;
font-weight:600;
transition:.25s;
}

.links a:hover{
background:white;
color:#111;
transform:translateY(-2px);
box-shadow:0 6px 15px rgba(0,0,0,.08);
}

.button{
text-decoration:none;
background:#181818;
color:white;
padding:11px 22px;
border-radius:999px;
font-weight:700;
transition:.25s;
}

.button:hover{
transform:translateY(-2px);
box-shadow:0 10px 22px rgba(0,0,0,.18);
}

section{
width:min(1200px,92%);
margin:auto;
}

.hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding-top:120px;
}

.hero h1{
font-size:72px;
line-height:1;
margin-bottom:20px;
}

.hero p{
font-size:20px;
max-width:650px;
color:#666;
}

.hero-btns{
margin-top:40px;
display:flex;
gap:15px;
flex-wrap:wrap;
justify-content:center;
}

.primary,
.secondary{
padding:15px 28px;
border-radius:999px;
font-weight:700;
text-decoration:none;
transition:.3s;
}

.primary{
background:#111;
color:white;
}

.secondary{
background:white;
color:#111;
border:1px solid rgba(0,0,0,.08);
}

.primary:hover,
.secondary:hover{
transform:translateY(-4px);
box-shadow:0 10px 25px rgba(0,0,0,.12);
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:22px;
margin:90px auto;
}

.stat{
background:white;
padding:35px;
border-radius:28px;
box-shadow:0 10px 25px rgba(0,0,0,.06);
}

.stat h2{
font-size:42px;
margin-bottom:8px;
}

.stat p{
color:#666;
}

.features{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
margin:120px auto;
}

.card{
background:white;
padding:32px;
border-radius:28px;
box-shadow:0 10px 25px rgba(0,0,0,.06);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.icon{
font-size:36px;
margin-bottom:20px;
}

.card h3{
margin-bottom:12px;
}

.card p{
color:#666;
line-height:1.6;
}

.cta{
margin:120px auto;
background:#111;
color:white;
padding:80px 40px;
border-radius:40px;
text-align:center;
}

.cta h2{
font-size:52px;
margin-bottom:20px;
}

.cta p{
max-width:650px;
margin:auto;
margin-bottom:35px;
opacity:.8;
}

footer{
text-align:center;
padding:60px 20px;
color:#777;
}

@media(max-width:850px){

.links{
display:none;
}

.hero h1{
font-size:46px;
}

.hero p{
font-size:18px;
}

.stats{
grid-template-columns:1fr;
}

.cta h2{
font-size:36px;
}

}

</style>
</head>

<body>

<nav>

<div class="logo">
<div class="logo-circle"></div>
CloudFurm
</div>

<div class="links">
<a href="#stats">Stats</a>
<a href="#features">Features</a>
</div>

<a href="#" class="button">CloudFurm V12</a>

</nav>

<section class="hero">

<h1>Build Faster.<br>Scale Smarter.</h1>

<p>
CloudFurm is a modern cloud platform that lets developers deploy,
manage and scale applications with speed, security and reliability.
</p>

<div class="hero-btns">
<a href="get-started.html" class="primary">Get Started</a>
<a href="documentation.html" class="secondary">Documentation</a>
</div>

</section>

</body>
</html>
