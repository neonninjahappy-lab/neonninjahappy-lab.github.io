<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudFurm — Under Construction</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #090d16;
        --text-main: #f8fafc;
            --text-muted: #94a3b8;
                --accent: #38bdf8;
                    --border: rgba(255, 255, 255, 0.1);
                    }

                    * {
                        margin: 0;
                            padding: 0;
                                box-sizing: border-box;
                                    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
                                    }

                                    body {
                                        min-height: 100vh;
                                            background-color: var(--bg);
                                                color: var(--text-main);
                                                    overflow-x: hidden;
                                                        position: relative;
                                                            display: flex;
                                                                flex-direction: column;
                                                                    justify-content: space-between;
                                                                    }

                                                                    /* Background Stars */
                                                                    .stars {
                                                                        position: fixed;
                                                                            inset: 0;
                                                                                pointer-events: none;
                                                                                    z-index: 1;
                                                                                    }

                                                                                    .star {
                                                                                        position: absolute;
                                                                                            width: 2px;
                                                                                                height: 2px;
                                                                                                    background: #ffffff;
                                                                                                        border-radius: 50%;
                                                                                                        }

                                                                                                        .shooting-star {
                                                                                                            position: absolute;
                                                                                                                width: 140px;
                                                                                                                    height: 1px;
                                                                                                                        background: linear-gradient(90deg, rgba(255,255,255,0.7), transparent);
                                                                                                                            animation: shoot linear infinite;
                                                                                                                                opacity: 0;
                                                                                                                                }

                                                                                                                                .shooting-star:nth-child(1) { top: 10%; left: -10%; animation-duration: 6s; animation-delay: 0s; }
                                                                                                                                .shooting-star:nth-child(2) { top: 35%; left: -10%; animation-duration: 8s; animation-delay: 2.5s; }
                                                                                                                                .shooting-star:nth-child(3) { top: 65%; left: -10%; animation-duration: 5s; animation-delay: 4s; }

                                                                                                                                @keyframes shoot {
                                                                                                                                    0% { transform: translateX(0) translateY(0) rotate(22deg); opacity: 0; }
                                                                                                                                        15% { opacity: 0.8; }
                                                                                                                                            85% { opacity: 0.8; }
                                                                                                                                                100% { transform: translateX(120vw) translateY(50vh) rotate(22deg); opacity: 0; }
                                                                                                                                                }

                                                                                                                                                @keyframes twinkle {
                                                                                                                                                    0%, 100% { opacity: 0.15; }
                                                                                                                                                        50% { opacity: 0.8; }
                                                                                                                                                        }

                                                                                                                                                        /* Header Navbar */
                                                                                                                                                        header {
                                                                                                                                                            position: relative;
                                                                                                                                                                z-index: 10;
                                                                                                                                                                    display: flex;
                                                                                                                                                                        justify-content: space-between;
                                                                                                                                                                            align-items: center;
                                                                                                                                                                                padding: 32px 5%;
                                                                                                                                                                                    max-width: 1200px;
                                                                                                                                                                                        margin: 0 auto;
                                                                                                                                                                                            width: 100%;
                                                                                                                                                                                            }

                                                                                                                                                                                            .brand {
                                                                                                                                                                                                font-weight: 700;
                                                                                                                                                                                                    font-size: 1.25rem;
                                                                                                                                                                                                        letter-spacing: -0.5px;
                                                                                                                                                                                                            color: #fff;
                                                                                                                                                                                                            }

                                                                                                                                                                                                            .status-badge {
                                                                                                                                                                                                                display: inline-flex;
                                                                                                                                                                                                                    align-items: center;
                                                                                                                                                                                                                        gap: 8px;
                                                                                                                                                                                                                            font-size: 0.85rem;
                                                                                                                                                                                                                                color: var(--text-muted);
                                                                                                                                                                                                                                    font-weight: 500;
                                                                                                                                                                                                                                        padding: 6px 14px;
                                                                                                                                                                                                                                            border: 1px solid var(--border);
                                                                                                                                                                                                                                                border-radius: 100px;
                                                                                                                                                                                                                                                    background: rgba(255, 255, 255, 0.02);
                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                    .status-dot {
                                                                                                                                                                                                                                                        width: 6px;
                                                                                                                                                                                                                                                            height: 6px;
                                                                                                                                                                                                                                                                background-color: #38bdf8;
                                                                                                                                                                                                                                                                    border-radius: 50%;
                                                                                                                                                                                                                                                                        box-shadow: 0 0 8px #38bdf8;
                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                        /* Main Content Area */
                                                                                                                                                                                                                                                                        main {
                                                                                                                                                                                                                                                                            position: relative;
                                                                                                                                                                                                                                                                                z-index: 10;
                                                                                                                                                                                                                                                                                    max-width: 800px;
                                                                                                                                                                                                                                                                                        width: 100%;
                                                                                                                                                                                                                                                                                            margin: auto;
                                                                                                                                                                                                                                                                                                padding: 60px 5%;
                                                                                                                                                                                                                                                                                                    text-align: center;
                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                    h1 {
                                                                                                                                                                                                                                                                                                        font-size: clamp(2.5rem, 5vw, 4rem);
                                                                                                                                                                                                                                                                                                            font-weight: 700;
                                                                                                                                                                                                                                                                                                                letter-spacing: -0.03em;
                                                                                                                                                                                                                                                                                                                    line-height: 1.1;
                                                                                                                                                                                                                                                                                                                        margin-bottom: 20px;
                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                        p {
                                                                                                                                                                                                                                                                                                                            font-size: 1.125rem;
                                                                                                                                                                                                                                                                                                                                color: var(--text-muted);
                                                                                                                                                                                                                                                                                                                                    line-height: 1.6;
                                                                                                                                                                                                                                                                                                                                        max-width: 580px;
                                                                                                                                                                                                                                                                                                                                            margin: 0 auto 40px auto;
                                                                                                                                                                                                                                                                                                                                                font-weight: 400;
                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                /* Professional Input Group */
                                                                                                                                                                                                                                                                                                                                                .form-container {
                                                                                                                                                                                                                                                                                                                                                    display: flex;
                                                                                                                                                                                                                                                                                                                                                        gap: 12px;
                                                                                                                                                                                                                                                                                                                                                            justify-content: center;
                                                                                                                                                                                                                                                                                                                                                                max-width: 440px;
                                                                                                                                                                                                                                                                                                                                                                    margin: 0 auto 32px auto;
                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                    input[type="email"] {
                                                                                                                                                                                                                                                                                                                                                                        flex: 1;
                                                                                                                                                                                                                                                                                                                                                                            background: rgba(255, 255, 255, 0.03);
                                                                                                                                                                                                                                                                                                                                                                                border: 1px solid var(--border);
                                                                                                                                                                                                                                                                                                                                                                                    border-radius: 8px;
                                                                                                                                                                                                                                                                                                                                                                                        padding: 12px 16px;
                                                                                                                                                                                                                                                                                                                                                                                            color: #fff;
                                                                                                                                                                                                                                                                                                                                                                                                font-size: 0.95rem;
                                                                                                                                                                                                                                                                                                                                                                                                    outline: none;
                                                                                                                                                                                                                                                                                                                                                                                                        transition: border-color 0.2s ease, background 0.2s ease;
                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                        input[type="email"]:focus {
                                                                                                                                                                                                                                                                                                                                                                                                            border-color: var(--accent);
                                                                                                                                                                                                                                                                                                                                                                                                                background: rgba(255, 255, 255, 0.05);
                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                input[type="email"]::placeholder {
                                                                                                                                                                                                                                                                                                                                                                                                                    color: #64748b;
                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                    .btn-primary {
                                                                                                                                                                                                                                                                                                                                                                                                                        background: #f8fafc;
                                                                                                                                                                                                                                                                                                                                                                                                                            color: #0f172a;
                                                                                                                                                                                                                                                                                                                                                                                                                                border: none;
                                                                                                                                                                                                                                                                                                                                                                                                                                    border-radius: 8px;
                                                                                                                                                                                                                                                                                                                                                                                                                                        padding: 12px 20px;
                                                                                                                                                                                                                                                                                                                                                                                                                                            font-size: 0.95rem;
                                                                                                                                                                                                                                                                                                                                                                                                                                                font-weight: 600;
                                                                                                                                                                                                                                                                                                                                                                                                                                                    cursor: pointer;
                                                                                                                                                                                                                                                                                                                                                                                                                                                        transition: background 0.2s ease, transform 0.1s ease;
                                                                                                                                                                                                                                                                                                                                                                                                                                                            white-space: nowrap;
                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                            .btn-primary:hover {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                background: #e2e8f0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                .btn-primary:active {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    transform: scale(0.98);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                    .back-link {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        display: inline-block;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            color: var(--text-muted);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                text-decoration: none;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    font-size: 0.9rem;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        font-weight: 500;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            transition: color 0.2s ease;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            .back-link:hover {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                color: #fff;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                /* Footer */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                footer {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    position: relative;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        z-index: 10;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            text-align: center;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                padding: 32px 5%;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    font-size: 0.85rem;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        color: #475569;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        @media (max-width: 480px) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            .form-container {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    flex-direction: column;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            .btn-primary {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    width: 100%;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </style>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </head>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <body>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="stars" id="starfield">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="shooting-star"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="shooting-star"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="shooting-star"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <header>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="brand">CloudFurm</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="status-badge">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <span class="status-dot"></span> coming soon
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </header>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <main>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <h1>CloudFurm UPD</h1>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <p>We are currently working on this page expect this to be done soon this week.</p>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <form class="form-container" onsubmit="event.preventDefault(); alert('Subscribed successfully.');">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <input type="email" placeholder="enter your email address..." required>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <button type="submit" class="btn-primary">Notify Me</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </form>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <a href="cloudfurm.com" class="back-link">Return Back To Homepage</a>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </main>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // Efficient JS Star Generation
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const starfield = document.getElementById("starfield");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const starCount = 120;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            for (let i = 0; i < starCount; i++) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const star = document.createElement("div");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    star.className = "star";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            star.style.left = `${Math.random() * 100}vw`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                star.style.top = `${Math.random() * 100}vh`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const opacity = Math.random() * 0.7 + 0.1;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            star.style.opacity = opacity;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    star.style.animation = `twinkle ${3 + Math.random() * 4}s infinite ease-in-out`;
