<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API & Settings</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
    padding:0;
      box-sizing:border-box;
        font-family:Inter,sans-serif;
        }

        body{
          background:#ecebe7;
            min-height:100vh;
              color: #111;
              }

              /* Top Navigation Bar */
              nav{
                position:fixed;
                  top:18px;
                    left:50%;
                      transform:translateX(-50%);
                        width:min(950px,92%);
                          height:62px;
                            display:flex;
                              align-items:center;
                                justify-content:space-between;
                                  padding:0 18px;
                                    background:rgba(255,255,255,.82);
                                      backdrop-filter:blur(18px);
                                        border:1px solid rgba(0,0,0,.08);
                                          border-radius:999px;
                                            box-shadow: 0 10px 35px rgba(0,0,0,.08);
                                              z-index:999;
                                              }

                                              .logo{
                                                display:flex;
                                                  align-items:center;
                                                    gap:12px;
                                                      font-size:20px;
                                                        font-weight:800;
                                                          color:#111;
                                                            text-decoration: none;
                                                            }

                                                            .logo-circle{
                                                              width:14px;
                                                                height:14px;
                                                                  border-radius:50%;
                                                                    background:#111;
                                                                    }

                                                                    .links{
                                                                      display:flex;
                                                                        gap:8px;
                                                                        }

                                                                        .links a{
                                                                          text-decoration:none;
                                                                            color:#555;
                                                                              padding:10px 18px;
                                                                                border-radius:999px;
                                                                                  font-weight:600;
                                                                                    transition:.25s;
                                                                                    }

                                                                                    .links a:hover{
                                                                                      background:white;
                                                                                        color:#111;
                                                                                          transform:translateY(-2px);
                                                                                            box-shadow: 0 6px 15px rgba(0,0,0,.08);
                                                                                            }

                                                                                            .button{
                                                                                              text-decoration:none;
                                                                                                background:#181818;
                                                                                                  color:white;
                                                                                                    padding:11px 22px;
                                                                                                      border-radius:999px;
                                                                                                        font-weight:700;
                                                                                                          transition:.25s;
                                                                                                          }

                                                                                                          .button:hover{
                                                                                                            transform:translateY(-2px);
                                                                                                              box-shadow: 0 10px 22px rgba(0,0,0,.18);
                                                                                                              }

                                                                                                              /* Page Content Container */
                                                                                                              .container {
                                                                                                                max-width: 800px;
                                                                                                                  margin: 120px auto 60px;
                                                                                                                    padding: 0 20px;
                                                                                                                    }

                                                                                                                    /* Updated Page Title Font to match 'CloudFurm' logo font */
                                                                                                                    .page-title {
                                                                                                                      font-family: Inter, sans-serif;
                                                                                                                        font-style: normal;
                                                                                                                          font-size: 42px;
                                                                                                                            font-weight: 800;
                                                                                                                              margin-bottom: 30px;
                                                                                                                                text-align: center;
                                                                                                                                  color: #111;
                                                                                                                                  }

                                                                                                                                  /* Card Boxes */
                                                                                                                                  .card {
                                                                                                                                    background: rgba(255, 255, 255, 0.7);
                                                                                                                                      backdrop-filter: blur(10px);
                                                                                                                                        border: 1px solid rgba(0, 0, 0, 0.08);
                                                                                                                                          border-radius: 24px;
                                                                                                                                            padding: 30px;
                                                                                                                                              margin-bottom: 24px;
                                                                                                                                                box-shadow: 0 8px 25px rgba(0,0,0,.04);
                                                                                                                                                }

                                                                                                                                                .card h2 {
                                                                                                                                                  font-size: 20px;
                                                                                                                                                    font-weight: 700;
                                                                                                                                                      margin-bottom: 15px;
                                                                                                                                                      }

                                                                                                                                                      .card p {
                                                                                                                                                        color: #666;
                                                                                                                                                          font-size: 14px;
                                                                                                                                                            margin-bottom: 20px;
                                                                                                                                                            }

                                                                                                                                                            /* Input Fields & Buttons Inside Card */
                                                                                                                                                            .input-group {
                                                                                                                                                              display: flex;
                                                                                                                                                                align-items: center;
                                                                                                                                                                  gap: 10px;
                                                                                                                                                                    width: 100%;
                                                                                                                                                                    }

                                                                                                                                                                    input[type="text"] {
                                                                                                                                                                      flex: 1;
                                                                                                                                                                        min-width: 0;
                                                                                                                                                                          padding: 12px 18px;
                                                                                                                                                                            border-radius: 999px;
                                                                                                                                                                              border: 1px solid rgba(0,0,0,0.15);
                                                                                                                                                                                background: #fff;
                                                                                                                                                                                  font-size: 14px;
                                                                                                                                                                                    outline: none;
                                                                                                                                                                                    }

                                                                                                                                                                                    input[type="text"]:focus {
                                                                                                                                                                                      border-color: #111;
                                                                                                                                                                                      }

                                                                                                                                                                                      .action-btn {
                                                                                                                                                                                        background: #181818;
                                                                                                                                                                                          color: #fff;
                                                                                                                                                                                            border: none;
                                                                                                                                                                                              padding: 12px 20px;
                                                                                                                                                                                                border-radius: 999px;
                                                                                                                                                                                                  font-weight: 600;
                                                                                                                                                                                                    font-size: 13px;
                                                                                                                                                                                                      cursor: pointer;
                                                                                                                                                                                                        white-space: nowrap;
                                                                                                                                                                                                          transition: 0.25s;
                                                                                                                                                                                                          }

                                                                                                                                                                                                          .action-btn:hover {
                                                                                                                                                                                                            transform: translateY(-2px);
                                                                                                                                                                                                              box-shadow: 0 6px 15px rgba(0,0,0,.15);
                                                                                                                                                                                                              }

                                                                                                                                                                                                              /* Setting Toggle Row */
                                                                                                                                                                                                              .setting-row {
                                                                                                                                                                                                                display: flex;
                                                                                                                                                                                                                  align-items: center;
                                                                                                                                                                                                                    justify-content: space-between;
                                                                                                                                                                                                                      padding: 12px 0;
                                                                                                                                                                                                                        border-bottom: 1px solid rgba(0,0,0,0.06);
                                                                                                                                                                                                                        }

                                                                                                                                                                                                                        .setting-row:last-child {
                                                                                                                                                                                                                          border-bottom: none;
                                                                                                                                                                                                                          }

                                                                                                                                                                                                                          .setting-info h3 {
                                                                                                                                                                                                                            font-size: 16px;
                                                                                                                                                                                                                              font-weight: 600;
                                                                                                                                                                                                                              }

                                                                                                                                                                                                                              .setting-info p {
                                                                                                                                                                                                                                margin-bottom: 0;
                                                                                                                                                                                                                                  font-size: 13px;
                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                  @media(max-width:850px){
                                                                                                                                                                                                                                    .links{
                                                                                                                                                                                                                                        display:none;
                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                          }

                                                                                                                                                                                                                                          </style>
                                                                                                                                                                                                                                          </head>

                                                                                                                                                                                                                                          <body>

                                                                                                                                                                                                                                          <nav>
                                                                                                                                                                                                                                            <a href="index.html" class="logo">
                                                                                                                                                                                                                                                <div class="logo-circle"></div>
                                                                                                                                                                                                                                                    CloudFurm
                                                                                                                                                                                                                                                      </a>

                                                                                                                                                                                                                                                        <div class="links">
                                                                                                                                                                                                                                                            <a href="index.html">Home</a>
                                                                                                                                                                                                                                                                <a href="https://youtube.com" target="_blank">Youtube</a>
                                                                                                                                                                                                                                                                  </div>

                                                                                                                                                                                                                                                                    <a href="index.html" class="button">Back</a>
                                                                                                                                                                                                                                                                    </nav>

                                                                                                                                                                                                                                                                    <div class="container">

                                                                                                                                                                                                                                                                      <h1 class="page-title">API &amp; Settings</h1>

                                                                                                                                                                                                                                                                        <div class="card">
                                                                                                                                                                                                                                                                            <h2>API Key</h2>
                                                                                                                                                                                                                                                                                <p>Use this key to authenticate requests with the CloudFurm API.</p>
                                                                                                                                                                                                                                                                                    <div class="input-group">
                                                                                                                                                                                                                                                                                          <input type="text" value="cf_live_9f8a7b6c5d4e3f2a1" readonly>
                                                                                                                                                                                                                                                                                                <button class="action-btn">Copy Key</button>
                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                      </div>

                                                                                                                                                                                                                                                                                                        <div class="card">
                                                                                                                                                                                                                                                                                                            <h2>General Settings</h2>
                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                    <div class="setting-row">
                                                                                                                                                                                                                                                                                                                          <div class="setting-info">
                                                                                                                                                                                                                                                                                                                                  <h3>Developer Mode</h3>
                                                                                                                                                                                                                                                                                                                                          <p>Enable detailed error logging and debug endpoints.</p>
                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                      <input type="checkbox" checked style="accent-color: #181818; width: 20px; height: 20px;">
                                                                                                                                                                                                                                                                                                                                                          </div>

                                                                                                                                                                                                                                                                                                                                                              <div class="setting-row">
                                                                                                                                                                                                                                                                                                                                                                    <div class="setting-info">
                                                                                                                                                                                                                                                                                                                                                                            <h3>Auto-Sync Data</h3>
                                                                                                                                                                                                                                                                                                                                                                                    <p>Automatically update cloud settings across sessions.</p>
                                                                                                                                                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                                                                                                                                                                <input type="checkbox" checked style="accent-color: #181818; width: 20px; height: 20px;">
                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                      </div>

                                                                                                                                                                                                                                                                                                                                                                                                      </div>

                                                                                                                                                                                                                                                                                                                                                                                                      </body>
